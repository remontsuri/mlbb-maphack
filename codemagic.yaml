workflows:
  build-maphack:
    name: Build MLBB Map Hack v8
    instance_type: mac_mini_m1
    max_build_duration: 10
    environment:
      xcode: latest
    scripts:
      - name: Build dylib v8
        script: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -arch arm64 -isysroot $SDK -miphoneos-version-min=14.0 -fobjc-arc -dynamiclib -framework UIKit -framework Foundation -framework CoreGraphics -o maphack_v8.dylib mlbb_analysis/maphack_src/maphack_v8_protocol.m
          ls -lh maphack_v8.dylib
    artifacts:
      - maphack_v8.dylib
