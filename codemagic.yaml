workflows:
  build-maphack:
    name: Build MLBB Map Hack
    instance_type: mac_mini_m1
    max_build_duration: 10
    environment:
      xcode: latest
    scripts:
      - name: Build dylib
        script: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -arch arm64 -isysroot $SDK -miphoneos-version-min=14.0 -fobjc-arc -dynamiclib -framework Foundation -o maphack.dylib mlbb_analysis/maphack_src/maphack_v3.m
          ls -lh maphack.dylib
    artifacts:
      - maphack.dylib
